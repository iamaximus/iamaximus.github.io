<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Example</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: beige;
      display: flex;
      height: 100vh;
    }

    .panel {
      flex: 1;
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="panel">About</div>
  <div class="panel">Projects</div>
  <div class="panel">Docs</div>
</body>
</html>
